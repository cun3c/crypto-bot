services:
  - name: crypto-bot-backend
    type: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODE
        value: demo
      - key: BINANCE_TESTNET_API_KEY
        sync: false
      - key: BINANCE_TESTNET_API_SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false