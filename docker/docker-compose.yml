version: "3.8"

services:
  backend:
    build: 
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      - postgres
      - redis
  
  frontend:
    build: 
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
  
  postgres:
    image: postgres:15
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: pass
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
