version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: cryptobot_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cryptobot_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
